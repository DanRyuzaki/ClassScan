name: classscan
description: "A web-based QR Classroom Attendance System built with Flutter, integrating Firebase Authentication, Cloud Firestore, and real-time QR scanning for efficient attendance tracking."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  hugeicons: ^1.1.5
  animate_on_hover: ^1.0.2
  mobile_scanner: ^5.2.3
  toastification: ^3.0.3
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  excel: ^4.0.6
  web: ^1.1.1
  qr_flutter: ^4.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/background/
    - assets/icons/
  uses-material-design: true

